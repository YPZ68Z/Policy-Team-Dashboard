name: Daily War Room Update

on:
  schedule:
    # 使用 UTC 時間。00:00 UTC 約為台灣早上 8 點；10:00 UTC 約為台灣晚上 6 點
    - cron: '0 0,10 * * *'
  workflow_dispatch: # 允許您在網頁上手動點擊執行

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Intelligence Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python update_news.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add index.html
          # 只有當檔案有變更時才 commit
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update War Room Dashboard"
          git push
